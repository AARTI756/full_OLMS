name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/OLMS_db"
      JWT_SECRET: "dummy-secret-at-least-16-chars"
      REFRESH_TOKEN_SECRET: "dummy-refresh-secret-at-least-16-chars"
      NEXT_PUBLIC_API_URL: "http://localhost:3000/api"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run prisma:generate

      - run: npm run build